      content: '';

      inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(251, 176, 59, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 100% 60% at 80% 100%, rgba(0, 0, 0, 0.15) 0%, transparent 45%),

    /* Ambient orbs */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .ambient span {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
    }
    .ambient span:nth-child(1) {
      width: 320px; height: 320px;
      background: #fbb03b;
      top: -10%; right: -5%;
      animation: float1 18s ease-in-out infinite;
    }
    .ambient span:nth-child(2) {
      width: 240px; height: 240px;
      background: rgba(255,255,255,0.15);
      bottom: -5%; left: -8%;
      animation: float2 22s ease-in-out infinite;
    }
    .ambient span:nth-child(3) {
      width: 160px; height: 160px;
      background: #fbb03b;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: float3 14s ease-in-out infinite;

    @media (prefers-reduced-motion: reduce) {
      .ambient span { animation: none; }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-20px, 30px) scale(1.05); }
      66% { transform: translate(15px, -20px) scale(0.98); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(25px, -25px) scale(1.08); }
    }
    @keyframes float3 {
